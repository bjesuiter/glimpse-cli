name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  pr:
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # danielroe/uppt v0.5.1, pinned to SHA as recommended by upstream.
      - uses: danielroe/uppt/pr@e4a14cf018abc126b709938c2c2c61d62b6d859e
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'release/v')
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write
    steps:
      # danielroe/uppt v0.5.1, pinned to SHA as recommended by upstream.
      - uses: danielroe/uppt/release@e4a14cf018abc126b709938c2c2c61d62b6d859e
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  pack:
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'push') && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: pack-${{ github.ref }}
      cancel-in-progress: false
    permissions: {}
    outputs:
      files: ${{ steps.pack.outputs.files }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Bun
        # oven-sh/setup-bun v2.2.0, pinned to SHA. Uses Node.js 24.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - id: pack
        # danielroe/uppt v0.5.1, pinned to SHA as recommended by upstream.
        uses: danielroe/uppt/pack@e4a14cf018abc126b709938c2c2c61d62b6d859e
        with:
          install: false
          checkout: false

  publish:
    if: |
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
      && startsWith(github.ref, 'refs/tags/v')
      && needs.pack.outputs.files != '[]'
    needs: pack
    runs-on: ubuntu-latest
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      id-token: write
    environment: npm
    steps:
      # danielroe/uppt v0.5.1, pinned to SHA as recommended by upstream.
      - uses: danielroe/uppt/publish@e4a14cf018abc126b709938c2c2c61d62b6d859e
        with:
          files: ${{ needs.pack.outputs.files }}
