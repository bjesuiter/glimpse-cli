name: binaries

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: bun-darwin-arm64
            artifact: glimpse-darwin-arm64
            binary: dist/glimpse-darwin-arm64
            smoke: ./dist/glimpse-darwin-arm64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: glimpse-linux-x64
            binary: dist/glimpse-linux-x64
            smoke: ./dist/glimpse-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: glimpse-linux-arm64
            binary: dist/glimpse-linux-arm64
            smoke: ./dist/glimpse-linux-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: glimpse-windows-x64
            binary: dist/glimpse-windows-x64.exe
            smoke: ./dist/glimpse-windows-x64.exe
          - os: windows-11-arm
            target: bun-windows-arm64
            artifact: glimpse-windows-arm64
            binary: dist/glimpse-windows-arm64.exe
            smoke: ./dist/glimpse-windows-arm64.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Set up .NET for Windows Glimpse host
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d
        with:
          dotnet-version: '8.0.x'

      - name: Install Linux smoke-test dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        if: runner.os != 'Windows'
        run: bun test

      - name: Build binary
        run: bun scripts/build-binaries.ts --target=${{ matrix.target }}

      - name: Smoke test CLI
        shell: bash
        run: |
          set -euo pipefail
          file "${{ matrix.binary }}" || true
          "${{ matrix.smoke }}" --help >/dev/null
          "${{ matrix.smoke }}" list

      - name: Smoke test window on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          runtime="$RUNNER_TEMP/glimpse-runtime"
          mkdir -p "$runtime"
          TMPDIR="$runtime" "${{ matrix.smoke }}" open --html '<h1>smoke</h1>' --name smoke --replace
          TMPDIR="$runtime" "${{ matrix.smoke }}" close --all --force

      - name: Smoke test window on Linux x64
        if: matrix.target == 'bun-linux-x64'
        shell: bash
        run: |
          set -euo pipefail
          runtime="$RUNNER_TEMP/glimpse-runtime"
          mkdir -p "$runtime"
          xvfb-run -a env TMPDIR="$runtime" GLIMPSE_BACKEND=chromium "${{ matrix.smoke }}" open --html '<h1>smoke</h1>' --name smoke --replace
          env TMPDIR="$runtime" "${{ matrix.smoke }}" close --all --force

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: ${{ runner.temp }}/glimpse-binaries
          merge-multiple: true

      - name: Attach binaries to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "${{ runner.temp }}"/glimpse-binaries/* --clobber
